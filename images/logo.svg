<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <!-- wobbly background -->
  <rect x="3" y="3" width="38" height="38"
        rx="10" ry="10"
        fill="#fff9c4" stroke="#2d2d2d" stroke-width="2.5"/>
  <!-- pencil body -->
  <polygon points="15,32 24,10 32,18 23,40"
           fill="#ff4d4d" stroke="#2d2d2d" stroke-width="1.8"
           stroke-linejoin="round"/>
  <!-- pencil tip (white) -->
  <polygon points="23,40 15,32 11,40"
           fill="#fdfbf7" stroke="#2d2d2d" stroke-width="1.8"
           stroke-linejoin="round"/>
  <!-- pencil metal band -->
  <line x1="17.5" y1="28.5" x2="26.5" y2="19.5"
        stroke="#2d2d2d" stroke-width="1.5" opacity="0.4"/>
  <!-- pencil eraser (blue) -->
  <ellipse cx="28" cy="14" rx="4.5" ry="2.5"
           fill="#2d5da1" stroke="#2d2d2d" stroke-width="1.5"
           transform="rotate(-45 28 14)"/>
</svg>
